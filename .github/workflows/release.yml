name: Build & Release MC Server

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $v = (Get-Content server-version.json | ConvertFrom-Json).version
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
          $cl = (Get-Content server-version.json | ConvertFrom-Json).changelog
          echo "CHANGELOG=$cl" >> $env:GITHUB_OUTPUT

      - name: Build release zip
        shell: pwsh
        run: .\build-release.ps1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Mabel Server v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Mabel Rice Farm Server v${{ steps.version.outputs.VERSION }}

            ${{ steps.version.outputs.CHANGELOG }}

            ### How to use
            1. Download the zip below
            2. Extract to any folder
            3. Edit `server.properties` (set your RCON password)
            4. Run `start.bat`
          files: release/mabel-server-v${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
